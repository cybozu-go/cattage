name: "Setup tools"
description: "Setup tools with aqua"
inputs:
  github_token:
    description: "GitHub Token"
    required: true
runs:
  using: composite
  steps:
    - uses: aquaproj/aqua-installer@646d8c1185053c1c44a38e60e3b3fc23ac386aca # v４.0.0
      with:
        aqua_version: v2.53.3
        github_token: ${{ inputs.github_token }}
