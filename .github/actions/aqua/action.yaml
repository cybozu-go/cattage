name: "Setup tools"
description: "Setup tools with aqua"
inputs:
  github_token:
    description: "GitHub Token"
    required: true
runs:
  using: composite
  steps:
    - uses: aquaproj/aqua-installer@74ea2b0b5494685013c685ada229e45e62279a70 # v４.0.0
      with:
        aqua_version: v2.53.3
        github_token: ${{ inputs.github_token }}
